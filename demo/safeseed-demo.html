- uses: tanjaminben/safeseed@v0
  with:
    data: fixtures/seed.csv
    record: fixtures/seed.record.json`,it=[{q:`Is "Designated for testing" an actual standard?`,a:(0,k.jsxs)(k.Fragment,{children:[`It is official, but not a neutral standards-body reservation like the provable values. Payment platforms publish these as their designated test numbers — see, for example, Stripe's`,` `,(0,k.jsx)(`a`,{href:`https://docs.stripe.com/testing`,target:`_blank`,rel:`noreferrer`,children:`testing docs`}),`; other processors publish their own equivalents. So they are authoritative, but the safety is by agreement: real processors are configured to reject them. That is why they sit in their own tier, one notch below "provably non-real," which is safe by impossibility rather than by agreement.`]})},{q:`Could a structurally fake value coincidentally match a real person? Isn't that the risk with AI synthetic data?`,a:(0,k.jsxs)(k.Fragment,{children:[`Honest answer: this tier does not claim impossibility — that is the provable tier, and the difference matters. The values are built to be unmistakably synthetic: `,(0,k.jsx)(`code`,{children:`TEST_Person_000142`}),` has a TEST_ prefix, an underscore, and a zero-padded counter, and addresses use the placeholder word "Example", so neither resembles anything a real registry would issue. A real match is therefore `,(0,k.jsx)(`strong`,{children:`vanishingly unlikely`}),` — for names and addresses, vanishingly unlikely but not impossible, and that honesty is exactly why this is the lowest tier. The decisive safeguard is that `,(0,k.jsx)(`strong`,{children:`no real data ever enters the generator`}),`, so even if a string coincidentally matched a real name, it carries no information about and no link to that person — the coincidence is inert. AI synthesizers are the opposite: they emit realistic values, and a "coincidence" there can be the model regurgitating a real record it memorized. So: provable tier = impossible; structurally fake tier = vanishingly unlikely and informationally inert, by design.`]})},{q:`Is this anonymization? Is the output GDPR-anonymous?`,a:(0,k.jsxs)(k.Fragment,{children:[`No, and the distinction matters. Anonymization is a process you run on real data to strip identifiers, and it always carries some re-identification risk. SafeSeed never touches real data — the values are invented from never-real sources, so on their own they relate to no natural person (cf.`,` `,(0,k.jsx)(`a`,{href:`https://gdpr-info.eu/recitals/no-26/`,target:`_blank`,rel:`noreferrer`,children:`GDPR Recital 26`}),`). That is a statement about the values in isolation, not a blanket ruling that privacy law no longer applies to your program.`]})},{q:`My team wants to add their own columns (job title, industry) to the generated file. Won't that break verification?`,a:(0,k.jsxs)(k.Fragment,{children:[`Whole-file verify will correctly flag it, because the file is no longer byte-for-byte what was generated — that is the point of tamper-evidence. For the "add your own non-PII columns" workflow, use `,(0,k.jsx)(`strong`,{children:`Scan`}),` (the Scan step in the demo above). Scan reads any file you already have and flags every value outside a reserved range, in the columns you name; it does not need the original run record, so it works fine after you have edited or extended the file. A column-scoped verify mode (attest the synthetic columns, allow extra ones) is on the roadmap to make this a first-class flow.`]})},{q:`Does it work with anything other than CSV?`,a:(0,k.jsx)(k.Fragment,{children:`CSV today, and a CSV opens directly in Excel or Google Sheets. More formats (JSON, SQL — see the format selector in the Scan step above) are straightforward to add, because the data is built as a plain table first and the file format is only the final step.`})},{q:`Does SafeSeed use encryption?`,a:(0,k.jsx)(k.Fragment,{children:`No. Verify uses a SHA-256 content fingerprint, which is a one-way cryptographic hash, not encryption. It proves the file has not changed, not that it is secret. The run r
